<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>MapLibre Test</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>#map{width:100%;height:100vh;background:#0b0e14;}body{margin:0;}
  #status{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.8);color:#fff;padding:8px;font-family:monospace;z-index:100;}</style>
</head>
<body>
  <div id="status">Initializing...</div>
  <div id="map"></div>
  <script>
    const s = document.getElementById('status');
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          runways: { type: 'geojson', data: '/maps/xplane/KSFO/combined/runways.geojson' },
          taxiways: { type: 'geojson', data: '/maps/xplane/KSFO/combined/pavement_taxiways.geojson' },
          aprons: { type: 'geojson', data: '/maps/xplane/KSFO/combined/pavement_aprons.geojson' },
          edges: { type: 'geojson', data: '/maps/xplane/KSFO/combined/lines_edges.geojson' },
        },
        layers: [
          { id: 'bg', type: 'background', paint: { 'background-color': '#0b0e14' } },
          { id: 'apron-fill', type: 'fill', source: 'aprons', paint: { 'fill-color': '#161921' } },
          { id: 'taxiway-fill', type: 'fill', source: 'taxiways', paint: { 'fill-color': '#1a1e28', 'fill-opacity': 0.95 } },
          { id: 'taxiway-edge', type: 'line', source: 'edges', paint: { 'line-color': '#fef08a', 'line-width': 1.5 } },
          { id: 'runway-line', type: 'line', source: 'runways', paint: { 'line-color': '#101520', 'line-width': 10 } },
        ]
      },
      center: [-122.37895905, 37.62175045], zoom: 14, minZoom: 12, maxZoom: 18,
      attributionControl: false
    });
    map.on('load', () => { s.textContent = 'Map loaded! Features visible.'; s.style.color = '#4ade80'; });
    map.on('error', (e) => { s.textContent = 'Error: ' + (e.error?.message || 'Unknown'); s.style.color = '#ef4444'; console.error(e); });
  </script>
</body>
</html>
