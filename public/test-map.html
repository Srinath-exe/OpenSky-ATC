<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MapLibre Test</title>
  <link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0e14; }
    #map { width: 100%; height: 100%; }
    #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 8px; z-index: 100; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <div id="info">Loading...</div>
  <div id="map"></div>
  <script>
    const info = document.getElementById('info');
    info.textContent = 'Initializing MapLibre...';
    
    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {
          runways: { type: 'geojson', data: '/maps/xplane/KSFO/combined/runways.geojson' },
          taxiways: { type: 'geojson', data: '/maps/xplane/KSFO/combined/pavement_taxiways.geojson' },
          aprons: { type: 'geojson', data: '/maps/xplane/KSFO/combined/pavement_aprons.geojson' },
          edges: { type: 'geojson', data: '/maps/xplane/KSFO/combined/lines_edges.geojson' },
        },
        layers: [
          { id: 'bg', type: 'background', paint: { 'background-color': '#0b0e14' } },
          { id: 'apron-fill', type: 'fill', source: 'aprons', paint: { 'fill-color': '#161921' } },
          { id: 'taxiway-fill', type: 'fill', source: 'taxiways', paint: { 'fill-color': '#1a1e28', 'fill-opacity': 0.95 } },
          { id: 'taxiway-outline', type: 'line', source: 'taxiways', paint: { 'line-color': '#2a3142', 'line-width': 2 } },
          { id: 'taxiway-edge', type: 'line', source: 'edges', paint: { 'line-color': '#fef08a', 'line-width': 1.5 } },
          { id: 'runway-line', type: 'line', source: 'runways', paint: { 'line-color': '#101520', 'line-width': 10 } },
        ]
      },
      center: [-122.37895905, 37.62175045],
      zoom: 14,
      minZoom: 12,
      maxZoom: 18,
    });
    
    map.on('load', () => {
      info.textContent = 'Map loaded successfully!';
      info.style.color = '#4ade80';
    });
    
    map.on('error', (e) => {
      info.textContent = 'Error: ' + (e.error?.message || JSON.stringify(e));
      info.style.color = '#ef4444';
      console.error('MapLibre error:', e);
    });
  </script>
</body>
</html>
